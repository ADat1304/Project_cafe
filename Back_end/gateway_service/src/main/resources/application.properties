quarkus.http.port=8080

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.credentials=true

# Downstream Service URLs for Microprofile REST Client
quarkus.rest-client.user-client.url=http://localhost:8081
quarkus.rest-client.product-client.url=http://localhost:8082
quarkus.rest-client.order-client.url=http://localhost:8083

# JWT verification (HS512)
smallrye.jwt.verify.key.algorithm=HS512
mp.jwt.verify.publickey=8VG09PFX0cgB8QSoHL4Tr6Ga6iplAmlulN8Xhi0J8aKpV706sf25auETOHWA2dZy
security.jwt.secret=8VG09PFX0cgB8QSoHL4Tr6Ga6iplAmlulN8Xhi0J8aKpV706sf25auETOHWA2dZy

# Simple rate-limiting guardrails to reduce DDoS impact
security.rate-limit.capacity=100
security.rate-limit.refill-tokens=50
security.rate-limit.whitelist=/actuator/health