# Quarkus Configuration
quarkus.http.port=8081

# Database Configuration
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/cafe
quarkus.datasource.username=root
quarkus.datasource.password=123456

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# JWT Security
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.issuer=http://localhost:8080

# JWT Signing (using the same secret as Spring Boot for compatibility)
# In production, use RSA keys. For HMAC:
smallrye.jwt.sign.key=8VG09PFX0cgB8QSoHL4Tr6Ga6iplAmlulN8Xhi0J8aKpV706sf25auETOHWA2dZy
smallrye.jwt.new-token.issuer=http://localhost:8080
smallrye.jwt.new-token.lifespan=86400

# Map scope claim
quarkus.smallrye-jwt.path.groups=scope
