# Quarkus Configuration
quarkus.http.port=8080

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization

# Registration of REST Clients
# These are used by the Gateway to forward requests to other services
# Note: In production, these would be internal cluster URLs
com.gateway_service.client.AuthClient/mp-rest/url=http://localhost:8081
com.gateway_service.client.ProductClient/mp-rest/url=http://localhost:8082
com.gateway_service.client.OrderClient/mp-rest/url=http://localhost:8083
